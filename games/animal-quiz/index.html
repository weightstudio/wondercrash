<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#67b66f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="robots" content="index,follow" />
    <meta name="description" content="Learn animal facts across five stage-based quizzes in Animal Quiz, a family-friendly educational game on WeightPlay." />
    <meta property="og:site_name" content="WeightPlay" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Animal Quiz - Educational Animal Game" />
    <meta property="og:description" content="Learn animal facts across five stage-based quizzes in Animal Quiz, a family-friendly educational game on WeightPlay." />
    <meta property="og:url" content="https://weightplay.com/games/animal-quiz/" />
    <meta property="og:image" content="https://weightplay.com/assets/quiz-cover.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>Animal Quiz - WeightPlay</title>
    <link rel="canonical" href="https://weightplay.com/games/animal-quiz/" />
    <link rel="stylesheet" href="style.css?v=20260702-skill-report1" />
    <link rel="stylesheet" href="../../src/tutorial.css?v=20260701-style1" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "VideoGame",
        "name": "Animal Quiz",
        "alternateName": "動物小博士",
        "url": "https://weightplay.com/games/animal-quiz/",
        "image": "https://weightplay.com/assets/quiz-cover.png",
        "description": "Learn animal facts across five stage-based quizzes in Animal Quiz, a family-friendly educational game on WeightPlay.",
        "applicationCategory": "Game",
        "operatingSystem": "Web browser",
        "publisher": { "@type": "Organization", "name": "WeightStudio" },
        "inLanguage": ["en", "zh-Hant"],
        "isAccessibleForFree": true
      }
    </script>
    <link rel="stylesheet" href="../../src/game-page-info.css?v=20260702-gameplay-tags1" />
  </head>
  <body>
    <main class="animal-game">
      <header class="topbar">
        <a id="homeLink" class="home-link" href="/" aria-label="Back to lobby">&larr;</a>
        <div>
          <p id="brandText">WeightPlay</p>
          <h1 id="titleText">Animal Quiz</h1>
        </div>
        <label class="language-picker">
          <span id="languageLabel">Language</span>
          <select id="localeSelect" aria-label="Language">
            <option value="en">English</option>
            <option value="zh-Hant">&#32321;&#39636;&#20013;&#25991;</option>
          </select>
        </label>
      </header>

      <section class="level-line" aria-label="Level progress">
        <span id="levelText">Level 1 / 8</span>
        <div><i id="levelFill"></i></div>
      </section>

      <section id="stageSelectPanel" class="stage-select">
        <strong id="stageSelectTitle">Choose Stage</strong>
        <div id="stageGrid" class="stage-grid"></div>
      </section>

      <section class="quiz-stage hidden">
        <div class="animal-card">
          <img id="animalImage" src="" alt="" />
          <strong id="promptText">Who is this animal?</strong>
          <span id="clueText"></span>
        </div>
      </section>

      <section id="choiceGrid" class="choice-grid hidden" aria-label="Answer choices"></section>

      <section class="feedback hidden" aria-live="polite">
        <strong id="feedbackText">Choose one</strong>
      </section>

      <div id="resultPanel" class="result-panel hidden">
        <div class="result-card">
          <strong id="resultTitle">Great job!</strong>
          <span id="resultText"></span>
          <div id="skillReport" class="skill-report" aria-live="polite"></div>
          <button id="againBtn" type="button">Play Again</button>
          <button id="nextStageBtn" type="button">Next Stage</button>
          <button id="stageSelectBtn" type="button">Stages</button>
          <a id="homeText" href="/">Lobby</a>
        </div>
      </div>

      <div id="loadingPanel" class="loading-panel">
        <div class="loading-card">
          <strong id="loadingTitle">Loading</strong>
          <span id="loadingText">0%</span>
          <div><i id="loadingFill"></i></div>
        </div>
      </div>
    </main>

    <script src="../../src/site-config.js?v=20260702-scroll-locale1"></script>
    <script src="../../src/version.js?v=20260701-version2"></script>
    <script src="../../src/analytics.js?v=20260701-analytics2"></script>
    <script>
      window.WonderAnalytics?.track("game_view", { game_id: "animal-quiz" });
    </script>
    <script src="../../src/sound.js?v=20260701-labels1"></script>
    <script src="../../src/edge-guard.js?v=20260702-focus1"></script>
    <script src="../../src/i18n.js?v=20260701-i18n2"></script>
    <script src="../../src/tutorial.js?v=20260702-tutorial-locale1"></script>
    <script src="game.js?v=20260702-skill-report1"></script>
    <script src="../../src/game-page-info.js?v=20260702-breadcrumb1"></script>
  </body>
</html>
