<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#6cb6ff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="robots" content="index,follow" />
    <meta name="description" content="Match colorful shape passengers to the right train cars in Shape Train, a gentle preschool puzzle game on WeightPlay." />
    <meta property="og:site_name" content="WeightPlay" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Shape Train - Preschool Shape Matching Game" />
    <meta property="og:description" content="Match colorful shape passengers to the right train cars in a gentle stage-based learning game." />
    <meta property="og:url" content="https://weightplay.com/games/shape-train/" />
    <meta property="og:image" content="https://weightplay.com/assets/shape-train-cover.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>Shape Train - WeightPlay</title>
    <link rel="canonical" href="https://weightplay.com/games/shape-train/" />
    <link rel="stylesheet" href="style.css?v=20260702-image-assets1" />
    <link rel="stylesheet" href="../../src/tutorial.css?v=20260701-style1" />
    <script type="application/ld+json">
{
              "@context": "https://schema.org",
              "@type": "VideoGame",
              "name": "Shape Train",
              "alternateName": "動物形狀小火車",
              "url": "https://weightplay.com/games/shape-train/",
              "image": "https://weightplay.com/assets/shape-train-cover.png",
              "description": "Match colorful shape passengers to the right train cars in a gentle preschool puzzle game.",
              "applicationCategory": "Game",
              "operatingSystem": "Web browser",
              "publisher": {
                      "@type": "Organization",
                      "name": "WeightStudio"
              },
              "inLanguage": [
                      "en",
                      "zh-Hant"
              ],
              "isAccessibleForFree": true,
              "genre": [
                      "Shape Puzzle",
                      "Animal Games",
                      "Education",
                      "Puzzle",
                      "Family",
                      "Animal Game",
                      "Family Browser Game"
              ],
              "audience": {
                      "@type": "Audience",
                      "audienceType": "Kids and families",
                      "suggestedMinAge": 3
              },
              "learningResourceType": "Skill practice through play",
              "educationalUse": "Practice Color Recognition, Logic, Hand-Eye Coordination through family-friendly browser gameplay."
      }
    </script>
    <link rel="stylesheet" href="../../src/game-page-info.css?v=20260702-related-cards2" />
  </head>
  <body>
    <main class="shape-game">
      <header class="topbar">
        <a class="home-link" href="/" aria-label="Back to lobby">&larr;</a>
        <div class="title-block">
          <p>WeightPlay</p>
          <h1 data-ui="gameTitle">Shape Train</h1>
        </div>
        <label class="language-picker">
          <span data-ui="language">Language</span>
          <select id="localeSelect" aria-label="Language">
            <option value="en">English</option>
            <option value="zh-Hant">&#32321;&#39636;&#20013;&#25991;</option>
          </select>
        </label>
      </header>

      <section id="menuPanel" class="menu-panel">
        <img class="cover" src="../../assets/shape-train-cover.png" alt="" />
        <div class="menu-copy">
          <strong data-ui="chooseStage">Choose Stage</strong>
          <span data-ui="menuHint">Match shape friends to the right train cars.</span>
        </div>
        <div id="stageGrid" class="stage-grid" aria-label="Stage list"></div>
      </section>

      <section id="playPanel" class="play-panel hidden">
        <div class="play-head">
          <button id="backToStagesBtn" class="soft-btn" type="button" data-ui="stages">Stages</button>
          <div class="progress-line">
            <span id="stageText">Stage 1</span>
            <div><i id="progressFill"></i></div>
          </div>
        </div>

        <div class="train-track" aria-label="Train cars">
          <div id="carGrid" class="car-grid"></div>
        </div>

        <div class="passenger-area">
          <p id="promptText">Who rides next?</p>
          <button id="passengerBtn" class="passenger" type="button" draggable="true" aria-label="Shape passenger">
            <span id="passengerShape"></span>
          </button>
        </div>
        <div id="feedbackText" class="feedback" aria-live="polite"></div>
      </section>

      <div id="resultPanel" class="result-panel hidden">
        <div class="result-card">
          <strong id="resultTitle">Great job!</strong>
          <div id="starText" class="stars">&#9734;&#9734;&#9734;</div>
          <span id="resultText"></span>
          <button id="nextStageBtn" type="button" data-ui="nextStage">Next Stage</button>
          <button id="retryBtn" type="button" data-ui="retry">Try Again</button>
          <button id="resultStagesBtn" type="button" data-ui="stages">Stages</button>
          <a href="/" data-ui="lobby">Lobby</a>
        </div>
      </div>

      <div id="loadingPanel" class="loading-panel">
        <div class="loading-card">
          <strong data-ui="loading">Loading</strong>
          <span id="loadingText">0%</span>
          <div><i id="loadingFill"></i></div>
        </div>
      </div>
    </main>

    <script src="../../src/site-config.js?v=20260702-scroll-locale1"></script>
    <script src="../../src/version.js?v=20260701-version2"></script>
    <script src="../../src/analytics.js?v=20260701-analytics2"></script>
    <script>
      window.WonderAnalytics?.track("game_view", { game_id: "shape-train" });
    </script>
    <script src="../../src/sound.js?v=20260701-labels1"></script>
    <script src="../../src/edge-guard.js?v=20260702-focus1"></script>
    <script src="../../src/i18n.js?v=20260701-i18n2"></script>
    <script src="../../src/tutorial.js?v=20260702-tutorial-locale1"></script>
    <script src="game.js?v=20260702-locale-scroll1"></script>
    <script src="../../src/game-page-info.js?v=20260702-related-cards2"></script>
  </body>
</html>
