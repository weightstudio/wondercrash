<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7b84b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="robots" content="index,follow" />
    <meta name="description" content="Clear snack matching stages, beat move goals, and unlock new levels in Snack Blocks, a mobile-friendly puzzle game on WeightPlay." />
    <meta property="og:site_name" content="WeightPlay" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Snack Blocks - Stage Match Puzzle Game" />
    <meta property="og:description" content="Clear snack matching stages, beat move goals, and unlock new levels in Snack Blocks, a mobile-friendly puzzle game on WeightPlay." />
    <meta property="og:url" content="https://weightplay.com/games/snack-blocks/" />
    <meta property="og:image" content="https://weightplay.com/assets/snack-blocks-cover.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>Snack Blocks - WeightPlay</title>
    <link rel="canonical" href="https://weightplay.com/games/snack-blocks/" />
    <link rel="stylesheet" href="style.css?v=20260630-noselect1" />
    <link rel="stylesheet" href="../../src/tutorial.css?v=20260701-style1" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "VideoGame",
        "name": "Snack Blocks",
        "alternateName": "動物零食方塊",
        "url": "https://weightplay.com/games/snack-blocks/",
        "image": "https://weightplay.com/assets/snack-blocks-cover.png",
        "description": "Clear snack matching stages, beat move goals, and unlock new levels in Snack Blocks, a mobile-friendly puzzle game on WeightPlay.",
        "applicationCategory": "Game",
        "operatingSystem": "Web browser",
        "publisher": { "@type": "Organization", "name": "WeightStudio" },
        "inLanguage": ["en", "zh-Hant"],
        "isAccessibleForFree": true
      }
    </script>
    <link rel="stylesheet" href="../../src/game-page-info.css?v=20260702-gameplay-tags1" />
  </head>
  <body>
    <main class="snack-game">
      <header class="topbar">
        <a id="homeLink" class="home-link" href="/" aria-label="Back to lobby">&larr;</a>
        <div>
          <p id="brandText">WeightPlay</p>
          <h1 id="titleText">Snack Blocks</h1>
        </div>
        <label class="language-picker">
          <span id="languageLabel">Language</span>
          <select id="localeSelect" aria-label="Language">
            <option value="en">English</option>
            <option value="zh-Hant">&#32321;&#39636;&#20013;&#25991;</option>
          </select>
        </label>
      </header>

      <section id="hud" class="hud hidden" aria-label="Game stats">
        <div><span id="stageLabel">Stage</span><strong id="stageText">1</strong></div>
        <div><span id="movesLabel">Moves</span><strong id="movesText">20</strong></div>
        <div><span id="targetLabel">Target</span><strong id="targetText">800</strong></div>
      </section>

      <section id="menuPanel" class="menu-panel">
        <img src="../../assets/snack-blocks-cover.png" alt="" />
        <strong id="menuTitle">Choose a snack stage.</strong>
        <span id="menuText">Match 3 or more snacks, hit the target, and unlock the next stage.</span>
        <div id="stageGrid" class="stage-grid"></div>
      </section>

      <section id="playPanel" class="play-panel hidden">
        <div id="scoreLine" class="score-line">
          <span id="scoreLabel">Score</span>
          <strong id="scoreText">0</strong>
        </div>
        <div id="board" class="board" aria-label="Snack Blocks board"></div>
        <p id="hintText" class="hint">Tap or drag a snack to swap with its neighbor.</p>
      </section>

      <section id="resultPanel" class="result-panel hidden">
        <div class="result-card">
          <strong id="resultTitle">Stage Clear!</strong>
          <span id="resultText"></span>
          <div id="resultStars" class="result-stars"></div>
          <div id="skillReport" class="skill-report" aria-live="polite"></div>
          <button id="nextBtn" type="button">Next Stage</button>
          <button id="againBtn" type="button">Try Again</button>
          <button id="menuBtn" type="button">Stages</button>
          <a id="lobbyLink" href="/">Lobby</a>
        </div>
      </section>

      <div id="loadingPanel" class="loading-panel">
        <div class="loading-card">
          <strong id="loadingTitle">Loading</strong>
          <span id="loadingText">0%</span>
          <div><i id="loadingFill"></i></div>
        </div>
      </div>
    </main>

    <script src="../../src/site-config.js?v=20260702-scroll-locale1"></script>
    <script src="../../src/version.js?v=20260701-version2"></script>
    <script src="../../src/analytics.js?v=20260701-analytics2"></script>
    <script>
      window.WonderAnalytics?.track("game_view", { game_id: "snack-blocks" });
    </script>
    <script src="../../src/sound.js?v=20260701-labels1"></script>
    <script src="../../src/edge-guard.js?v=20260702-focus1"></script>
    <script src="../../src/i18n.js?v=20260701-i18n2"></script>
    <script src="../../src/tutorial.js?v=20260702-tutorial-locale1"></script>
    <script src="game.js?v=20260702-zh-hant1"></script>
    <script src="../../src/game-page-info.js?v=20260702-breadcrumb1"></script>
  </body>
</html>
