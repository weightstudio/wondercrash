  </head>
  <body>
    <main class="memory-game">
      <!-- Top Navigation and Settings -->
      <header class="topbar">
        <a class="home-link" href="/" id="homeLink" aria-label="Back to lobby">&larr;</a>
        <div>
          <p id="brandText">WeightPlay</p>
          <h1 id="titleText">Star Memory</h1>
        </div>
        <div class="header-right">
          <label class="language-picker">
            <span id="languageLabel">Language</span>
            <select id="localeSelect" aria-label="Language">
              <option value="en">English</option>
              <option value="zh-Hant">&#32321;&#39636;&#20013;&#25991;</option>
            </select>
          </label>
        </div>
      </header>

      <!-- Gameplay HUD -->
      <section id="gameHud" class="game-hud hidden" aria-label="Game stats">
        <div class="hud-item">
          <span id="levelIndicator">Level 1 / 10</span>
          <div><i id="levelFill"></i></div>
        </div>
        <div class="hud-item-score">
          <span id="scoreLabel">Score</span>
          <strong id="scoreText">0</strong>
        </div>
        <div class="hud-item-moves">
          <span id="movesLabel">Moves</span>
          <strong id="movesText">0 / 0</strong>
        </div>
      </section>

      <!-- Stage Selection Screen -->
      <section id="stageSelectPanel" class="stage-select">
        <h2 id="stageSelectTitle">Choose Level</h2>
        <div id="stageGrid" class="stage-grid"></div>
      </section>

      <!-- Main Game Board -->
      <section id="gameBoardPanel" class="game-board-panel hidden">
        <div id="cardGrid" class="card-grid"></div>
      </section>

      <!-- Gameplay Footer / Tips -->
      <section id="gameFeedback" class="feedback hidden" aria-live="polite">
        <strong id="feedbackText">Tap cards to find matching pairs!</strong>
        <div id="comboContainer" class="combo-badge hidden">
          Combo <span id="comboText">x2</span>
        </div>
      </section>

      <!-- Overlay Panel (Victory / Failure / All Clear) -->
      <div id="resultPanel" class="result-panel hidden">
        <div class="result-card">
          <h2 id="resultTitle">Level Clear!</h2>
          
          <div id="starContainer" class="star-rating">
            <span class="star" data-index="1">&#9733;</span>
            <span class="star" data-index="2">&#9733;</span>
            <span class="star" data-index="3">&#9733;</span>
          </div>

          <p id="resultText">You cleared the level in 12 moves!</p>
          
          <div class="result-actions">
            <button id="nextLevelBtn" type="button">Next Level</button>
            <button id="againBtn" type="button">Play Again</button>
            <button id="stageSelectBtn" type="button">Levels</button>
            <a id="lobbyLink" href="/" class="lobby-btn">Lobby</a>
          </div>
        </div>
      </div>

      <!-- Loading Panel -->
      <div id="loadingPanel" class="loading-panel">
        <div class="loading-card">
          <strong id="loadingTitle">Loading</strong>
          <span id="loadingText">0%</span>
          <div><i id="loadingFill"></i></div>
        </div>
      </div>
    </main>

    <!-- Site Configuration & Framework Scripts -->

    <script src="../../src/tutorial.js?v=20260702-tutorial-locale1"></script>
    <script src="game.js?v=20260702-locale-scroll1"></script>
    <script src="../../src/game-page-info.js?v=20260702-animal-quiz-seo1"></script>
  </body>
