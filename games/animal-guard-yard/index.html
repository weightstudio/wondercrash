  <body>
    <main class="yard-game">
      <header class="topbar">
        <a class="home-link" href="/" aria-label="Back to lobby">&larr;</a>
        <div class="title-block">
          <p>WeightPlay</p>
          <h1 data-ui="gameTitle">Animal Guard Yard</h1>
        </div>
        <label class="language-picker">
          <span data-ui="language">Language</span>
          <select id="localeSelect" aria-label="Language">
            <option value="en">English</option>
            <option value="zh-Hant">&#32321;&#39636;&#20013;&#25991;</option>
          </select>
        </label>
      </header>

      <section id="menuPanel" class="menu-panel">
        <div class="menu-shell">
          <div class="wallet-row" aria-label="Animal Guard Yard wallet">
            <span class="coin-chip"><img src="../../assets/coin.png" alt="" /><b id="coinText">0</b></span>
            <span class="diamond-chip"><img src="../../assets/shape-token-diamond.svg" alt="" /><b id="diamondText">0</b></span>
          </div>
          <section id="stageTabPanel" class="menu-tab-panel" data-tab-panel="stages">
            <img class="cover" src="../../assets/animal-guard-yard-poster.png" alt="" />
            <div class="menu-copy">
              <strong data-ui="chooseStage">Choose Stage</strong>
              <span data-ui="menuHint">Place animal guards and stop the zombies.</span>
            </div>
            <div id="stageGrid" class="stage-grid" aria-label="Stage list"></div>
          </section>
          <section id="animalTabPanel" class="menu-tab-panel hidden" data-tab-panel="animals">
            <div class="kennel-panel">
              <div class="kennel-head">
                <strong data-ui="kennelTitle">Animal Training</strong>
                <span data-ui="kennelHint">Upgrade guards with coins. Unlock rare animals with diamonds.</span>
              </div>
              <div id="kennelGrid" class="kennel-grid" aria-label="Animal upgrades"></div>
            </div>
          </section>
          <section id="shopTabPanel" class="menu-tab-panel hidden" data-tab-panel="shop">
            <div class="shop-panel">
              <div class="kennel-head">
                <strong data-ui="shopTitle">Rare Animal Shop</strong>
                <span data-ui="shopHint">Spend shared WeightPlay diamonds on special animal guards.</span>
              </div>
              <div id="shopGrid" class="shop-grid" aria-label="Animal shop"></div>
            </div>
          </section>
        </div>
        <nav id="menuTabs" class="menu-tabs" aria-label="Animal Guard Yard menu">
          <button type="button" data-menu-tab="stages" class="active"><img src="../../assets/menu-battle.png" alt="" /><span data-ui="tabStages">Stages</span></button>
          <button type="button" data-menu-tab="animals"><img src="../../assets/menu-character.png" alt="" /><span data-ui="tabAnimals">Animals</span></button>
          <button type="button" data-menu-tab="shop"><img src="../../assets/upgrade-coin.png" alt="" /><span data-ui="tabShop">Shop</span></button>
        </nav>
      </section>

      <section id="playPanel" class="play-panel hidden">
        <div class="play-head">
          <button id="backToStagesBtn" class="soft-btn" type="button" data-ui="stages">Stages</button>
          <div class="resource-pill" aria-label="Sun energy"><span class="hud-icon sun-icon" aria-hidden="true"></span><b id="energyText">0</b></div>
          <div class="base-pill" aria-label="Home hearts"><span class="hud-icon heart-icon" aria-hidden="true"></span><b id="baseText">3</b></div>
        </div>
        <div id="waveText" class="wave-text">Stage 1</div>
        <div id="unitBar" class="unit-bar" aria-label="Animal guards"></div>
        <div id="yardBoard" class="yard-board" aria-label="Animal defense lanes">
          <div id="dangerAlert" class="danger-alert hidden" aria-live="polite">Danger!</div>
        </div>
        <div id="hintText" class="hint-text" aria-live="polite"></div>
      </section>

      <div id="resultPanel" class="result-panel hidden">
        <div class="result-card">
          <strong id="resultTitle">Victory!</strong>
          <div id="resultText" class="result-report"></div>
          <button id="nextStageBtn" type="button" data-ui="nextStage">Next Stage</button>
          <button id="retryBtn" type="button" data-ui="retry">Try Again</button>
          <button id="resultStagesBtn" type="button" data-ui="stages">Stages</button>
          <a href="/" data-ui="lobby">Lobby</a>
        </div>
      </div>

      <div id="loadingPanel" class="loading-panel">
        <div class="loading-card">
          <strong data-ui="loading">Loading</strong>
          <span id="loadingText">0%</span>
          <div><i id="loadingFill"></i></div>
        </div>
      </div>
    </main>
