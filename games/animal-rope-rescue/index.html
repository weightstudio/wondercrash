<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#7ed8ff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="robots" content="index,follow" />
    <meta name="description" content="Play Animal Rope Rescue, a free animal physics puzzle game where you cut vines, drop fruit, and help cute animals across short mobile-friendly stages." />
    <meta property="og:site_name" content="WeightPlay" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Animal Rope Rescue - Free Animal Physics Puzzle" />
    <meta property="og:description" content="Cut vines, release fruit, bounce through jungle puzzles, and help animals in a family-friendly WeightPlay browser game." />
    <meta property="og:url" content="https://weightplay.com/games/animal-rope-rescue/" />
    <meta property="og:image" content="https://weightplay.com/assets/animal-rope-cover.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>Animal Rope Rescue - WeightPlay</title>
    <link rel="canonical" href="https://weightplay.com/games/animal-rope-rescue/" />
    <link rel="stylesheet" href="style.css?v=20260702-rope1" />
    <link rel="stylesheet" href="../../src/tutorial.css?v=20260701-style1" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "VideoGame",
        "name": "Animal Rope Rescue",
        "alternateName": "動物藤蔓救援",
        "url": "https://weightplay.com/games/animal-rope-rescue/",
        "image": "https://weightplay.com/assets/animal-rope-cover.svg",
        "description": "Cut vines, release fruit, and help animals in short physics puzzle stages.",
        "applicationCategory": "Game",
        "operatingSystem": "Web browser",
        "publisher": { "@type": "Organization", "name": "WeightStudio" },
        "inLanguage": ["en", "zh-Hant"],
        "isAccessibleForFree": true,
        "genre": ["Physics Puzzle", "Animal Games", "Puzzle", "Family Browser Game"],
        "audience": { "@type": "Audience", "audienceType": "Kids and families", "suggestedMinAge": 7 },
        "learningResourceType": "Skill practice through play",
        "educationalUse": "Practice Logic, Focus, Problem Solving, and Hand-Eye Coordination through family-friendly browser gameplay."
      }
    </script>
    <link rel="stylesheet" href="../../src/game-page-info.css?v=20260702-related-cards2" />
  </head>
  <body>
    <main class="rope-game">
      <header class="topbar">
        <a class="home-link" href="/" aria-label="Back to lobby">&larr;</a>
        <div class="title-block">
          <p>WeightPlay</p>
          <h1 data-ui="gameTitle">Animal Rope Rescue</h1>
        </div>
        <label class="language-picker">
          <span data-ui="language">Language</span>
          <select id="localeSelect" aria-label="Language">
            <option value="en">English</option>
            <option value="zh-Hant">&#32321;&#39636;&#20013;&#25991;</option>
          </select>
        </label>
      </header>

      <section id="menuPanel" class="menu-panel">
        <img class="cover" src="../../assets/animal-rope-cover.svg" alt="" />
        <div class="menu-copy">
          <strong data-ui="chooseStage">Choose Stage</strong>
          <span data-ui="menuHint">Cut vines and guide fruit to hungry animals.</span>
        </div>
        <div id="stageGrid" class="stage-grid" aria-label="Stage list"></div>
      </section>

      <section id="playPanel" class="play-panel hidden">
        <div class="play-head">
          <button id="backToStagesBtn" class="soft-btn" type="button" data-ui="stages">Stages</button>
          <div class="level-copy">
            <strong id="stageText">Stage 1</strong>
            <span id="goalText">Cut the vine at the right time.</span>
          </div>
          <div class="move-pill"><span data-ui="moves">Cuts</span> <b id="moveText">0/1</b></div>
        </div>

        <div id="arena" class="arena" aria-label="Animal rope puzzle area">
          <img id="animalImg" class="animal-img" src="../../assets/animal-rope-monkey.svg" alt="" />
          <img id="fruitImg" class="fruit-img" src="../../assets/animal-rope-fruit.svg" alt="" />
          <svg id="ropeLayer" class="rope-layer" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true"></svg>
          <div id="bumperLayer" class="bumper-layer" aria-hidden="true"></div>
          <div id="sparkLayer" class="spark-layer" aria-hidden="true"></div>
        </div>
        <p id="feedbackText" class="feedback" aria-live="polite"></p>
      </section>

      <div id="resultPanel" class="result-panel hidden">
        <div class="result-card">
          <strong id="resultTitle">Great rescue!</strong>
          <div id="starText" class="stars">&#9733;&#9733;&#9733;</div>
          <span id="resultText"></span>
          <div id="skillReport" class="skill-report"></div>
          <button id="nextStageBtn" type="button" data-ui="nextStage">Next Stage</button>
          <button id="retryBtn" type="button" data-ui="retry">Try Again</button>
          <button id="resultStagesBtn" type="button" data-ui="stages">Stages</button>
          <a href="/" data-ui="lobby">Lobby</a>
        </div>
      </div>

      <div id="loadingPanel" class="loading-panel">
        <div class="loading-card">
          <strong data-ui="loading">Loading</strong>
          <span id="loadingText">0%</span>
          <div><i id="loadingFill"></i></div>
        </div>
      </div>
    </main>

    <script src="../../src/site-config.js?v=20260702-rope1"></script>
    <script src="../../src/version.js?v=20260701-version2"></script>
    <script src="../../src/analytics.js?v=20260701-analytics2"></script>
    <script>
      window.WonderAnalytics?.track("game_view", { game_id: "animal-rope-rescue" });
    </script>
    <script src="../../src/sound.js?v=20260701-labels1"></script>
    <script src="../../src/edge-guard.js?v=20260702-focus1"></script>
    <script src="../../src/i18n.js?v=20260701-i18n2"></script>
    <script src="../../src/tutorial.js?v=20260702-rope1"></script>
    <script src="game.js?v=20260702-rope1"></script>
    <script src="../../src/game-page-info.js?v=20260702-rope1"></script>
  </body>
</html>
