<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#3f9f51" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="robots" content="index,follow" />
    <meta name="description" content="Cut vines, move the leaf trampoline, and guide fruit to hungry animals in Animal Vine Rescue, a family-friendly animal physics puzzle on WeightPlay." />
    <meta property="og:site_name" content="WeightPlay" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Animal Vine Rescue - WeightPlay" />
    <meta property="og:description" content="A mobile-friendly animal physics puzzle with vine timing, bouncing fruit, and stage goals." />
    <meta property="og:url" content="https://weightplay.com/games/animal-rope-rescue/" />
    <meta property="og:image" content="https://weightplay.com/assets/animal-vine-rescue-cover.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>Animal Vine Rescue - WeightPlay</title>
    <link rel="canonical" href="https://weightplay.com/games/animal-rope-rescue/" />
    <link rel="stylesheet" href="style.css?v=20260702-vine-rebuild1" />
    <link rel="stylesheet" href="../../src/tutorial.css?v=20260701-style1" />
    <link rel="stylesheet" href="../../src/game-page-info.css?v=20260702-related-cards2" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "VideoGame",
        "name": "Animal Vine Rescue",
        "url": "https://weightplay.com/games/animal-rope-rescue/",
        "image": "https://weightplay.com/assets/animal-vine-rescue-cover.png",
        "description": "Cut vines, move the leaf trampoline, and guide fruit to hungry animals in a family-friendly animal physics puzzle.",
        "applicationCategory": "Game",
        "operatingSystem": "Web browser",
        "publisher": { "@type": "Organization", "name": "WeightStudio" },
        "inLanguage": ["en", "zh-Hant"],
        "isAccessibleForFree": true,
        "genre": ["Animal Games", "Physics Puzzle", "Family Browser Game"],
        "audience": { "@type": "Audience", "audienceType": "Kids and families", "suggestedMinAge": 5 },
        "learningResourceType": "Skill practice through play",
        "educationalUse": "Practice timing, focus, hand-eye coordination, and problem solving through family-friendly gameplay."
      }
    </script>
  </head>
  <body>
    <main class="vine-app">
      <header class="topbar">
        <a class="icon-btn" href="/" aria-label="Back to lobby">&larr;</a>
        <div>
          <p>WeightPlay</p>
          <h1 data-ui="title">Animal Vine Rescue</h1>
        </div>
        <label class="language-picker">
          <span data-ui="language">Language</span>
          <select id="localeSelect" aria-label="Language">
            <option value="en">English</option>
            <option value="zh-Hant">&#32321;&#39636;&#20013;&#25991;</option>
          </select>
        </label>
      </header>

      <section id="menuPanel" class="menu-panel">
        <img class="cover" src="../../assets/animal-vine-rescue-cover.png" alt="" />
        <div class="menu-copy">
          <strong data-ui="menuTitle">Rescue fruit for hungry animals.</strong>
          <span data-ui="menuHint">Cut the vine, drag the leaf, and bounce fruit into the animal basket.</span>
          <button id="startBtn" type="button" data-ui="start">Choose Stage</button>
        </div>
      </section>

      <section id="stagePanel" class="stage-panel hidden" aria-label="Stages"></section>

      <section id="gamePanel" class="game-panel hidden">
        <div class="hud-row">
          <button id="stageBackBtn" type="button" class="soft-btn" data-ui="stages">Stages</button>
          <div class="hud-pill"><span data-ui="stage">Stage</span><b id="stageText">1</b></div>
          <div class="hud-pill"><span data-ui="score">Score</span><b id="scoreText">0</b></div>
        </div>
        <div id="playfield" class="playfield" aria-label="Animal vine rescue playfield">
          <div id="targetZone" class="target-zone">
            <img id="targetAnimal" alt="" />
            <img class="basket" src="../../assets/animal-vine-basket.png" alt="" draggable="false" />
          </div>
          <button id="vineButton" class="vine-button" type="button" aria-label="Cut vine">
            <img class="vine-img" src="../../assets/animal-vine-rope.png" alt="" draggable="false" />
            <span data-ui="cut">Cut</span>
          </button>
          <img id="fruit" class="fruit" alt="" draggable="false" />
          <img id="leafPaddle" class="leaf-paddle" src="../../assets/animal-vine-leaf-paddle.png" alt="" draggable="false" />
          <div id="floatText" class="float-text hidden"></div>
        </div>
        <p id="hintText" class="hint-text" data-ui="hint">Drag the leaf. Cut the vine when you are ready.</p>
      </section>

      <div id="resultPanel" class="result-panel hidden">
        <div class="result-card">
          <strong id="resultTitle">Fruit rescued!</strong>
          <div id="starText" class="stars">&#9733;&#9733;&#9733;</div>
          <span id="resultText"></span>
          <button id="nextStageBtn" type="button" data-ui="nextStage">Next Stage</button>
          <button id="retryBtn" type="button" data-ui="retry">Try Again</button>
          <button id="resultStagesBtn" type="button" data-ui="stages">Stages</button>
          <a href="/" data-ui="lobby">Lobby</a>
        </div>
      </div>

      <div id="loadingPanel" class="loading-panel">
        <div class="loading-card">
          <strong data-ui="loading">Loading</strong>
          <span id="loadingText">0%</span>
          <div><i id="loadingFill"></i></div>
        </div>
      </div>
      <div id="toastText" class="toast hidden" aria-live="polite"></div>
    </main>

    <script src="../../src/site-config.js?v=20260702-vine-rebuild1"></script>
    <script src="../../src/version.js?v=20260701-version2"></script>
    <script src="../../src/analytics.js?v=20260701-analytics2"></script>
    <script>window.WonderAnalytics?.track("game_view", { game_id: "animal-rope-rescue" });</script>
    <script src="../../src/sound.js?v=20260701-labels1"></script>
    <script src="../../src/edge-guard.js?v=20260702-focus1"></script>
    <script src="../../src/i18n.js?v=20260701-i18n2"></script>
    <script src="../../src/tutorial.js?v=20260702-tutorial-locale1"></script>
    <script src="game.js?v=20260702-vine-rebuild1"></script>
    <script src="../../src/game-page-info.js?v=20260702-related-cards2"></script>
  </body>
</html>
