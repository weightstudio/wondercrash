  <body>
    <main class="garden-game">
      <header class="topbar">
        <a class="home-link" href="/" aria-label="Back to lobby">&larr;</a>
        <div class="title-block">
          <p>WeightPlay</p>
          <h1 id="titleText">Garden Tile Match</h1>
        </div>
        <label class="language-picker">
          <span id="languageLabel">Language</span>
          <select id="localeSelect" aria-label="Language">
            <option value="en">English</option>
            <option value="zh-Hant">&#32321;&#39636;&#20013;&#25991;</option>
          </select>
        </label>
      </header>

      <section class="statusbar" aria-label="Game status">
        <div>
          <span id="levelLabel">Level</span>
          <strong id="levelText">1 / 10</strong>
        </div>
        <div>
          <span id="movesLabel">Moves</span>
          <strong id="movesText">0</strong>
        </div>
        <div>
          <span id="pairsLabel">Pairs</span>
          <strong id="pairsText">0 / 0</strong>
        </div>
      </section>

      <section id="levelSelect" class="level-select">
        <h2 id="levelSelectTitle">Choose Level</h2>
        <div id="levelGrid" class="level-grid"></div>
        <div id="levelMessage" class="message" aria-live="polite"></div>
      </section>

      <section id="boardPanel" class="board-panel hidden">
        <div id="board" class="tile-board" aria-label="Garden tile board"></div>
        <div id="message" class="message" aria-live="polite"></div>
      </section>

      <section id="resultPanel" class="result-panel hidden" role="dialog" aria-modal="true">
        <div class="result-card">
          <h2 id="resultTitle">Level Clear</h2>
          <div id="stars" class="stars">&#9734;&#9734;&#9734;</div>
          <p id="resultText">Great matching.</p>
          <div class="result-actions">
            <button id="nextBtn" type="button">Next Level</button>
            <button id="againBtn" type="button">Play Again</button>
            <button id="levelsBtn" type="button">Levels</button>
            <a id="lobbyLink" href="/">Lobby</a>
          </div>
        </div>
      </section>

      <section id="loadingPanel" class="loading-panel">
        <div class="loading-card">
          <strong id="loadingTitle">Loading</strong>
          <span>100%</span>
          <div><i></i></div>
        </div>
      </section>
    </main>
