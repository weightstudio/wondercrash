    <script type="application/ld+json">
{
              "@context": "https://schema.org",
              "@type": "VideoGame",
              "name": "Color Lunchbox",
              "alternateName": "動物顏色便當盒",
              "url": "https://weightplay.com/games/color-lunchbox/",
              "image": "https://weightplay.com/assets/lunchbox-cover.png",
              "description": "Clear 12 gentle color matching stages in Color Lunchbox, a WeightPlay game for kids and families.",
              "applicationCategory": "Game",
              "operatingSystem": "Web browser",
              "publisher": {
                      "@type": "Organization",
                      "name": "WeightStudio"
              },
              "inLanguage": [
                      "en",
                      "zh-Hant"
              ],
              "isAccessibleForFree": true,
              "genre": [
                      "Color Match",
                      "Animal Games",
                      "Education",
                      "Family",
                      "Animal Game",
                      "Family Browser Game"
              ],
              "audience": {
                      "@type": "Audience",
                      "audienceType": "Kids and families",
                      "suggestedMinAge": 3
              },
              "learningResourceType": "Skill practice through play",
              "educationalUse": "Practice Color Recognition, Focus, Hand-Eye Coordination through family-friendly browser gameplay."
      }
    </script>
    <link rel="stylesheet" href="../../src/game-page-info.css?v=20260702-related-cards2" />
    <link rel="stylesheet" href="../../src/loading-screen.css?v=20260702-unified1" />
  </head>
  <body>
    <main class="lunch-game">
      <header class="topbar">
        <a class="home-link" href="/" id="homeLink" aria-label="Back to lobby">&larr;</a>
        <div>
          <p id="brandText">WeightPlay</p>
          <h1 id="titleText">Color Lunchbox</h1>
        </div>
        <div class="header-right">
          <label class="language-picker">
            <span id="languageLabel">Language</span>
            <select id="localeSelect" aria-label="Language">
              <option value="en">English</option>
              <option value="zh-Hant">&#32321;&#39636;&#20013;&#25991;</option>
            </select>
          </label>
        </div>
      </header>

      <section id="gameHud" class="game-hud hidden" aria-label="Game stats">
        <div class="hud-item">
          <span id="levelIndicator">Level 1 / 12</span>
          <div><i id="progressFill"></i></div>
        </div>
        <div class="hud-item-score">
          <span id="scoreLabel">Score</span>
          <strong id="scoreText">0</strong>
        </div>
        <div class="hud-item-round">
          <span id="roundLabel">Round</span>
          <strong id="roundText">1 / 8</strong>
        </div>
      </section>

      <section id="stageSelectPanel" class="stage-select">
        <h2 id="stageSelectTitle">Choose Level</h2>
        <div id="stageGrid" class="stage-grid"></div>
      </section>

      <div id="gamePlayContent" class="game-play-content hidden">
        <section id="dropZone" class="lunchboxes" aria-label="Lunchbox drop zones"></section>

        <section class="food-stage" aria-label="Food card drag area">
          <div id="foodCard" class="food-card" role="button" aria-label="Drag food card">
            <img id="foodImage" src="" alt="" />
            <strong id="foodName"></strong>
          </div>
        </section>

        <section class="feedback" aria-live="polite">
          <strong id="feedbackText">Ready to play?</strong>
        </section>
      </div>

      <div id="resultPanel" class="result-panel hidden">
        <div class="result-card">
          <h2 id="resultTitle">Complete!</h2>
          <div id="resultText" class="result-report"></div>

          <div class="result-actions">
            <button id="nextStageBtn" type="button">Next Level</button>
            <button id="againBtn" type="button">Play Again</button>
            <button id="stageSelectBtn" type="button">Levels</button>
            <a id="lobbyLink" href="/" class="lobby-btn">Lobby</a>
          </div>
        </div>
      </div>

      <div id="loadingPanel" class="loading-panel">
        <div class="loading-card">
          <strong id="loadingTitle">Loading</strong>
          <span id="loadingText">0%</span>
          <div><i id="loadingFill"></i></div>
        </div>
      </div>
    </main>

    <script src="../../src/site-config.js?v=20260702-scroll-locale1"></script>
    <script src="../../src/version.js?v=20260701-version2"></script>
    <script src="../../src/analytics.js?v=20260701-analytics2"></script>
    <script>
      window.WonderAnalytics?.track("game_view", { game_id: "color-lunchbox" });
    </script>
    <script src="../../src/sound.js?v=20260701-labels1"></script>
    <script src="../../src/edge-guard.js?v=20260702-focus1"></script>
    <script src="../../src/i18n.js?v=20260701-i18n2"></script>
    <script src="../../src/tutorial.js?v=20260702-tutorial-locale1"></script>
    <script src="game.js?v=20260701-levels1"></script>
    <script src="../../src/game-page-info.js?v=20260702-animal-quiz-seo1"></script>
  </body>
</html>
