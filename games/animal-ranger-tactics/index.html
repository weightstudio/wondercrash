<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#163b31" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="robots" content="index,follow" />
    <meta name="description" content="Play Animal Ranger Tactics, a deeper 13+ animal strategy game about balancing habitats, wildlife, research, and threats on WeightPlay." />
    <meta property="og:site_name" content="WeightPlay" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Animal Ranger Tactics - 13+ Animal Strategy Game" />
    <meta property="og:description" content="Plan ranger actions, protect habitats, and balance animal ecosystems in a deeper 13+ strategy game on WeightPlay." />
    <meta property="og:url" content="https://weightplay.com/games/animal-ranger-tactics/" />
    <meta property="og:image" content="https://weightplay.com/assets/animal-ranger-cover.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>Animal Ranger Tactics - WeightPlay</title>
    <link rel="canonical" href="https://weightplay.com/games/animal-ranger-tactics/" />
    <link rel="stylesheet" href="style.css?v=20260702-tactics1" />
    <link rel="stylesheet" href="../../src/tutorial.css?v=20260701-style1" />
    <link rel="stylesheet" href="../../src/game-page-info.css?v=20260702-scroll-fix1" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "VideoGame",
        "name": "Animal Ranger Tactics",
        "alternateName": "動物巡守戰略",
        "url": "https://weightplay.com/games/animal-ranger-tactics/",
        "image": "https://weightplay.com/assets/animal-ranger-cover.svg",
        "description": "A deeper 13+ animal strategy game about balancing habitats, wildlife, research, and threats.",
        "applicationCategory": "Game",
        "operatingSystem": "Web browser",
        "publisher": { "@type": "Organization", "name": "WeightStudio" },
        "inLanguage": ["en", "zh-Hant"],
        "isAccessibleForFree": true,
        "genre": ["Strategy", "Simulation", "Animal Games", "Educational Games", "Family Browser Game"],
        "audience": { "@type": "Audience", "audienceType": "Teens and families", "suggestedMinAge": 13 },
        "learningResourceType": "Skill practice through play",
        "educationalUse": "Practice Logic, Problem Solving, Focus, and Animal Knowledge through family-friendly browser gameplay."
      }
    </script>
  </head>
  <body>
    <main class="ranger-game">
      <header class="topbar">
        <a class="home-link" href="/" aria-label="Back to lobby">&larr;</a>
        <div class="title-block">
          <p>WeightPlay</p>
          <h1 id="titleText">Animal Ranger Tactics</h1>
        </div>
        <label class="language-picker">
          <span id="languageLabel">Language</span>
          <select id="localeSelect" aria-label="Language">
            <option value="en">English</option>
            <option value="zh-Hant">&#32321;&#39636;&#20013;&#25991;</option>
          </select>
        </label>
      </header>

      <section class="statusbar" aria-label="Game status">
        <div><span id="missionLabel">Mission</span><strong id="missionText">1 / 6</strong></div>
        <div><span id="turnLabel">Turn</span><strong id="turnText">1 / 8</strong></div>
        <div><span id="actionLabel">Actions</span><strong id="actionText">3</strong></div>
        <div><span id="scoreLabel">Balance</span><strong id="scoreText">0</strong></div>
      </section>

      <section id="missionSelect" class="mission-select">
        <h2 id="missionSelectTitle">Choose Mission</h2>
        <div id="missionGrid" class="mission-grid"></div>
        <p id="missionMessage" class="message" aria-live="polite"></p>
      </section>

      <section id="playPanel" class="play-panel hidden">
        <div class="briefing">
          <img id="biomeImage" src="../../assets/animal-ranger-forest.svg" alt="" />
          <div>
            <h2 id="biomeTitle">Forest Corridor</h2>
            <p id="biomeGoal">Keep wildlife, habitat, and threat control balanced.</p>
          </div>
        </div>

        <div id="grid" class="tactics-grid" aria-label="Habitat grid"></div>

        <div class="ranger-row" id="rangerRow"></div>

        <div class="action-panel">
          <button type="button" data-action="patrol"><strong id="patrolTitle">Patrol</strong><span id="patrolText">Reduce threat.</span></button>
          <button type="button" data-action="restore"><strong id="restoreTitle">Restore</strong><span id="restoreText">Repair habitat.</span></button>
          <button type="button" data-action="research"><strong id="researchTitle">Research</strong><span id="researchText">Increase animal growth.</span></button>
        </div>

        <div class="play-actions">
          <button id="endTurnBtn" type="button">End Turn</button>
          <button id="menuBtn" type="button">Missions</button>
        </div>
        <p id="hintText" class="message" aria-live="polite"></p>
      </section>

      <section id="resultPanel" class="result-panel hidden" role="dialog" aria-modal="true">
        <div class="result-card">
          <h2 id="resultTitle">Mission Complete</h2>
          <div id="stars" class="stars">&#9734;&#9734;&#9734;</div>
          <p id="resultText">Balanced ecosystem.</p>
          <div id="skillReport" class="skill-report"></div>
          <div class="result-actions">
            <button id="nextBtn" type="button">Next Mission</button>
            <button id="againBtn" type="button">Retry</button>
            <button id="levelsBtn" type="button">Missions</button>
            <a id="lobbyLink" href="/">Lobby</a>
          </div>
        </div>
      </section>

      <section id="loadingPanel" class="loading-panel">
        <div class="loading-card">
          <strong id="loadingTitle">Loading</strong>
          <span>100%</span>
          <div><i></i></div>
        </div>
      </section>
    </main>

    <script src="../../src/site-config.js?v=20260702-ranger1"></script>
    <script src="../../src/version.js?v=20260701-version2"></script>
    <script src="../../src/analytics.js?v=20260701-analytics2"></script>
    <script>
      window.WonderAnalytics?.track("game_view", { game_id: "animal-ranger-tactics" });
    </script>
    <script src="../../src/sound.js?v=20260701-labels1"></script>
    <script src="../../src/edge-guard.js?v=20260702-focus1"></script>
    <script src="../../src/i18n.js?v=20260701-i18n2"></script>
    <script src="../../src/tutorial.js?v=20260702-ranger1"></script>
    <script src="game.js?v=20260702-tactics1"></script>
    <script src="../../src/game-page-info.js?v=20260702-ranger1"></script>
  </body>
</html>
