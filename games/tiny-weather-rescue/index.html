<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#57b9e8" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="robots" content="index,follow" />
    <meta name="description" content="Help cute animals through weather, hunger, mud, darkness, and other gentle care missions in Animal Helper Quest." />
    <meta property="og:site_name" content="WeightPlay" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Animal Helper Quest - Animal Care Game" />
    <meta property="og:description" content="Tap or drag the right care item to help cute animals through gentle missions." />
    <meta property="og:url" content="https://weightplay.com/games/tiny-weather-rescue/" />
    <meta property="og:image" content="https://weightplay.com/assets/tiny-weather-rescue-cover.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>Animal Helper Quest - WeightPlay</title>
    <link rel="canonical" href="https://weightplay.com/games/tiny-weather-rescue/" />
    <link rel="stylesheet" href="style.css?v=20260702-tool-icons1" />
    <link rel="stylesheet" href="../../src/tutorial.css?v=20260701-style1" />
    <script type="application/ld+json">
{
              "@context": "https://schema.org",
              "@type": "VideoGame",
              "name": "Animal Helper Quest",
              "alternateName": "動物幫幫隊",
              "url": "https://weightplay.com/games/tiny-weather-rescue/",
              "image": "https://weightplay.com/assets/tiny-weather-rescue-cover.png",
              "description": "Help cute animals through weather, hunger, mud, darkness, and other gentle care missions.",
              "applicationCategory": "Game",
              "operatingSystem": "Web browser",
              "publisher": {
                      "@type": "Organization",
                      "name": "WeightStudio"
              },
              "inLanguage": [
                      "en",
                      "zh-Hant"
              ],
              "isAccessibleForFree": true,
              "genre": [
                      "Problem Puzzle",
                      "Animal Games",
                      "Puzzle",
                      "Family",
                      "Animal Game",
                      "Family Browser Game"
              ],
              "audience": {
                      "@type": "Audience",
                      "audienceType": "Kids and families",
                      "suggestedMinAge": 5
              },
              "learningResourceType": "Skill practice through play",
              "educationalUse": "Practice Problem Solving, Animal Knowledge, Focus through family-friendly browser gameplay."
      }
    </script>
    <link rel="stylesheet" href="../../src/game-page-info.css?v=20260702-strategy-tips2" />
  </head>
  <body>
    <main class="weather-game">
      <header class="topbar">
        <a class="home-link" href="/" aria-label="Back to lobby">&larr;</a>
        <div class="title-block">
          <p>WeightPlay</p>
          <h1 data-ui="gameTitle">Animal Helper Quest</h1>
        </div>
        <label class="language-picker">
          <span data-ui="language">Language</span>
          <select id="localeSelect" aria-label="Language">
            <option value="en">English</option>
            <option value="zh-Hant">&#32321;&#39636;&#20013;&#25991;</option>
          </select>
        </label>
      </header>

      <section id="menuPanel" class="menu-panel">
        <img class="cover" src="../../assets/tiny-weather-rescue-cover.png" alt="" />
        <div class="menu-copy">
          <strong data-ui="chooseStage">Choose Rescue</strong>
          <span data-ui="menuHint">Tap or drag the right tool to help the little animal.</span>
        </div>
        <div id="stageGrid" class="stage-grid" aria-label="Stage list"></div>
      </section>

      <section id="playPanel" class="play-panel hidden">
        <div class="play-head">
          <button id="backToStagesBtn" class="soft-btn" type="button" data-ui="stages">Stages</button>
          <div class="stats">
            <span id="stageText">Stage 1</span>
            <span id="movesText" class="round-progress"><b>1/4</b><i></i></span>
            <span id="starsText">Help 0</span>
          </div>
        </div>
        <div id="board" class="board" aria-label="Animal helper board"></div>
        <div id="hintText" class="hint" aria-live="polite"></div>
      </section>

      <div id="resultPanel" class="result-panel hidden">
        <div class="result-card">
          <strong id="resultTitle">Rescue Complete!</strong>
          <div id="starText" class="stars">&#9734;&#9734;&#9734;</div>
          <span id="resultText"></span>
          <div id="skillReport" class="skill-report" aria-live="polite"></div>
          <button id="nextStageBtn" type="button" data-ui="nextStage">Next Stage</button>
          <button id="retryBtn" type="button" data-ui="retry">Try Again</button>
          <button id="resultStagesBtn" type="button" data-ui="stages">Stages</button>
          <a href="/" data-ui="lobby">Lobby</a>
        </div>
      </div>

      <div id="loadingPanel" class="loading-panel">
        <div class="loading-card">
          <strong data-ui="loading">Loading</strong>
          <span id="loadingText">0%</span>
          <div><i id="loadingFill"></i></div>
        </div>
      </div>
    </main>

    <script src="../../src/site-config.js?v=20260702-scroll-locale1"></script>
    <script src="../../src/version.js?v=20260701-version2"></script>
    <script src="../../src/analytics.js?v=20260701-analytics2"></script>
    <script>
      window.WonderAnalytics?.track("game_view", { game_id: "tiny-weather-rescue" });
    </script>
    <script src="../../src/sound.js?v=20260701-labels1"></script>
    <script src="../../src/edge-guard.js?v=20260702-focus1"></script>
    <script src="../../src/i18n.js?v=20260701-i18n2"></script>
    <script src="../../src/tutorial.js?v=20260702-tutorial-locale1"></script>
    <script src="game.js?v=20260702-tool-icons1"></script>
    <script src="../../src/game-page-info.js?v=20260702-strategy-tips2"></script>
  </body>
</html>
