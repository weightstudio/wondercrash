  <body>
    <main class="dash-game">
      <header class="topbar">
        <a class="home-link" href="/" aria-label="Back to lobby">&larr;</a>
        <div>
          <p>WeightPlay</p>
          <h1 id="titleText">Campus Dash</h1>
        </div>
        <label class="language-picker">
          <span id="languageLabel">Language</span>
          <select id="localeSelect" aria-label="Language">
            <option value="en">English</option>
            <option value="zh-Hant">&#32321;&#39636;&#20013;&#25991;</option>
          </select>
        </label>
      </header>

      <section id="hud" class="hud hidden">
        <div><span id="scoreLabel">Score</span><strong id="scoreText">0</strong></div>
        <div><span id="timeLabel">Time</span><strong id="timeText">60</strong></div>
        <div><span id="comboLabel">Combo</span><strong id="comboText">x1</strong></div>
      </section>

      <section class="canvas-wrap">
        <canvas id="gameCanvas" width="720" height="960" aria-label="Campus Dash game"></canvas>
      </section>

      <section id="startPanel" class="panel">
        <strong id="startTitle">Swipe. Dodge. Score.</strong>
        <p id="startText">Move left and right, collect stars, and survive 60 seconds.</p>
        <button id="startBtn" type="button">Start</button>
      </section>

      <section id="resultPanel" class="panel hidden">
        <strong id="resultTitle">Run Complete!</strong>
        <p id="resultText"></p>
        <div id="leaderboard" class="leaderboard"></div>
        <button id="againBtn" type="button">Run Again</button>
        <a id="lobbyLink" href="/">Lobby</a>
      </section>

      <div id="loadingPanel" class="loading-panel">
        <div class="loading-card">
          <strong id="loadingTitle">Loading</strong>
          <span id="loadingText">0%</span>
          <div><i id="loadingFill"></i></div>
        </div>
      </div>
    </main>
