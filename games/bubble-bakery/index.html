              },

                      "en",

              ],
              "isAccessibleForFree": true,
              "genre": [
                      "Bubble Puzzle",

                      "Family",
                      "Animal Game",

              ],

  </head>
  <body>
    <main class="bakery-game">
      <header class="topbar">
        <a class="home-link" href="/" aria-label="Back to lobby">&larr;</a>
        <div class="title-block">
          <p>WeightPlay</p>
          <h1 data-ui="gameTitle">Bubble Bakery</h1>
        </div>
        <label class="language-picker">
          <span data-ui="language">Language</span>
          <select id="localeSelect" aria-label="Language">
            <option value="en">English</option>
            <option value="zh-Hant">&#32321;&#39636;&#20013;&#25991;</option>
          </select>
        </label>
      </header>

      <section id="menuPanel" class="menu-panel">
        <img class="cover" src="../../assets/bubble-bakery-cover.png" alt="" />
        <div class="menu-copy">
          <strong data-ui="chooseStage">Choose Stage</strong>
          <span data-ui="menuHint">Tap matching bubbles to fill bakery orders.</span>
        </div>
        <div id="stageGrid" class="stage-grid" aria-label="Stage list"></div>
      </section>

      <section id="playPanel" class="play-panel hidden">
        <div class="play-head">
          <button id="backToStagesBtn" class="soft-btn" type="button" data-ui="stages">Stages</button>
          <div class="hud-pill"><span data-ui="moves">Moves</span><b id="movesText">0</b></div>
          <div class="hud-pill"><span data-ui="score">Score</span><b id="scoreText">0</b></div>
        </div>
        <div id="orderBar" class="order-bar" aria-label="Bakery orders"></div>
        <div id="board" class="bubble-board" aria-label="Bubble board"></div>
        <div id="hintText" class="hint-text" aria-live="polite"></div>
      </section>

      <div id="resultPanel" class="result-panel hidden">
        <div class="result-card">
          <strong id="resultTitle">Order complete!</strong>
          <div id="starText" class="stars">&#9734;&#9734;&#9734;</div>
          <span id="resultText"></span>
          <button id="nextStageBtn" type="button" data-ui="nextStage">Next Stage</button>
          <button id="retryBtn" type="button" data-ui="retry">Try Again</button>
          <button id="resultStagesBtn" type="button" data-ui="stages">Stages</button>
          <a href="/" data-ui="lobby">Lobby</a>
        </div>
      </div>

      <div id="loadingPanel" class="loading-panel">
        <div class="loading-card">
          <strong data-ui="loading">Loading</strong>
          <span id="loadingText">0%</span>
          <div><i id="loadingFill"></i></div>
        </div>
      </div>
    </main>

    <script src="../../src/site-config.js?v=20260702-bubble-qa1"></script>

    <script src="../../src/i18n.js?v=20260701-i18n2"></script>
    <script src="../../src/tutorial.js?v=20260702-tutorial-locale1"></script>
    <script src="game.js?v=20260702-bubble-qa1"></script>
    <script src="../../src/game-page-info.js?v=20260702-shape-seo1"></script>
