<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#162132" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="robots" content="index,follow" />
    <meta name="description" content="Drop fruits, merge matching pairs, and chase a high score from blueberry to watermelon in Fruit Merge Tower on WeightPlay." />
    <meta property="og:site_name" content="WeightPlay" />

    <meta property="og:description" content="Drop fruits, merge matching pairs, and chase a high score from blueberry to watermelon in Fruit Merge Tower on WeightPlay." />
    <meta property="og:url" content="https://weightplay.com/games/fruit-merge/" />
    <meta property="og:image" content="https://weightplay.com/assets/fruit-merge-cover.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>Fruit Merge Tower - WeightPlay</title>
    <link rel="canonical" href="https://weightplay.com/games/fruit-merge/" />
    <link rel="stylesheet" href="style.css?v=20260701-progress-report1" />
    <link rel="stylesheet" href="../../src/tutorial.css?v=20260701-style1" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "VideoGame",
        "name": "Fruit Merge Tower",
        "alternateName": "動物水果合成",
        "url": "https://weightplay.com/games/fruit-merge/",
        "image": "https://weightplay.com/assets/fruit-merge-cover.png",
        "description": "Drop fruits, merge matching pairs, and chase a high score from blueberry to watermelon in Fruit Merge Tower on WeightPlay.",
        "applicationCategory": "Game",
        "operatingSystem": "Web browser",
        "publisher": { "@type": "Organization", "name": "WeightStudio" },
        "inLanguage": ["en", "zh-Hant"],
        "isAccessibleForFree": true
      }
    </script>
    <link rel="stylesheet" href="../../src/game-page-info.css?v=20260702-gameplay-tags1" />
  </head>
  <body>
    <main class="fruit-game">
      <header class="topbar">
        <a class="home-link" href="/" aria-label="Back to lobby">&larr;</a>
        <div class="title-block">
          <p>WeightPlay</p>
          <h1 id="titleText">Fruit Merge Tower</h1>
        </div>
        <label class="language-picker">
          <span id="languageLabel">Language</span>
          <select id="localeSelect" aria-label="Language">
            <option value="en">English</option>
            <option value="zh-Hant">&#32321;&#39636;&#20013;&#25991;</option>
          </select>
        </label>
      </header>

      <section class="scorebar" aria-label="Score">
        <div>
          <span id="scoreLabel">Score</span>
          <strong id="scoreText">0</strong>
        </div>
        <div>
          <span id="bestLabel">Best</span>
          <strong id="bestText">0</strong>
        </div>
        <div>
          <span id="nextLabel">Next</span>
          <strong id="nextFruitText" class="next-fruit-preview" aria-label="Blueberry"></strong>
        </div>
      </section>

      <section class="board-shell">
        <canvas id="gameCanvas" width="720" height="1040" aria-label="Fruit merge game board"></canvas>
        <div id="toast" class="toast hidden" aria-live="polite"></div>
      </section>

      <section class="controls">
        <button id="dropBtn" type="button">Drop</button>
        <button id="restartBtn" type="button">Restart</button>
      </section>

      <section id="menuPanel" class="menu-panel">
        <div>
          <h2 id="menuTitle">Merge to Watermelon</h2>
          <p id="menuDesc">Drop fruits carefully. Matching fruits merge into the next fruit.</p>
        </div>
        <button id="startBtn" type="button">Start</button>
      </section>

      <section id="resultPanel" class="result-panel hidden" role="dialog" aria-modal="true">
        <div class="result-card">
          <h2 id="resultTitle">Game Over</h2>
          <div id="resultText" class="result-report">Score 0</div>
          <div class="result-actions">
            <button id="playAgainBtn" type="button">Play Again</button>
            <a href="/" id="lobbyLink">Lobby</a>
          </div>
        </div>
      </section>

      <section id="loadingPanel" class="loading-panel">
        <div class="loading-card">
          <strong id="loadingTitle">Loading</strong>
          <span id="loadingText">100%</span>
          <div><i></i></div>
        </div>
      </section>
    </main>

    <script src="../../src/site-config.js?v=20260702-scroll-locale1"></script>
    <script src="../../src/version.js?v=20260701-version2"></script>
    <script src="../../src/analytics.js?v=20260701-analytics2"></script>
    <script>
      window.WonderAnalytics?.track("game_view", { game_id: "fruit-merge" });
    </script>
    <script src="../../src/sound.js?v=20260701-labels1"></script>
    <script src="../../src/edge-guard.js?v=20260702-focus1"></script>
    <script src="../../src/i18n.js?v=20260701-i18n2"></script>
    <script src="../../src/tutorial.js?v=20260702-tutorial-locale1"></script>
    <script src="../../src/vendor/matter.min.js?v=20260630-matter1"></script>
    <script src="../../src/vendor/matter-global.js?v=20260630-matter1"></script>
    <script src="game.js?v=20260701-progress-report1"></script>
    <script src="../../src/game-page-info.js?v=20260702-breadcrumb1"></script>
  </body>
</html>
