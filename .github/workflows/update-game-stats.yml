name: Update game stats

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-game-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Update GA4 game stats
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GA4_CLIENT_EMAIL: ${{ secrets.GA4_CLIENT_EMAIL }}
          GA4_PRIVATE_KEY: ${{ secrets.GA4_PRIVATE_KEY }}
          GA4_SITE_PATH_PREFIX: ""
          GA4_LOOKBACK_DAYS: 7
        run: node scripts/update-game-stats.mjs
      - name: Commit updated stats
        run: |
          git config user.name "WeightPlay Bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/game-stats.json
          test -f docs/analytics-latest-report.md && git add docs/analytics-latest-report.md || true
          if git diff --cached --quiet; then
            echo "No game stats changes to publish."
          else
            git commit -m "Update game stats"
            git pull --rebase --autostash
            git push
          fi
